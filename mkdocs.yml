site_name: bsky-cli
site_url: https://harveyrandall.github.io/bsky-cli
site_description: A command-line client for Bluesky
repo_url: https://github.com/harveyrandall/bsky-cli
repo_name: harveyrandall/bsky-cli

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Commands: commands.md
  - Configuration: configuration.md
  - Shell Completions: completions.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
